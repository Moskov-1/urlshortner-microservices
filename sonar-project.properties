# Sonar configuration (SonarCloud recommended)
# Project key + organization are passed via GitHub Actions secrets to avoid hardcoding.

# Display name (optional)
sonar.projectName=urlshortner-microservices

# Source configuration
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/venv/**,**/.venv/**,**/dist/**,**/build/**,**/vendor/**

# If you later add unit tests + coverage, wire them here.
# Examples:
# sonar.go.coverage.reportPaths=coverage.out
# sonar.python.coverage.reportPaths=coverage.xml
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
