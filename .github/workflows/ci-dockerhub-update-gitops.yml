name: CI -> Docker Hub -> GitOps Repo

on:
  push:
    branches:
      - dev

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Go tests (if any)
        working-directory: ./go-service
        run: |
          go test ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Node install
        working-directory: ./node-service
        run: |
          npm install

      - name: Node tests (if present)
        working-directory: ./node-service
        run: |
          npm test --if-present

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python install
        working-directory: ./python-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        working-directory: ./python-service
        run: |
          python -m compileall .

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}

      - name: SonarCloud Quality Gate
        uses: SonarSource/sonarcloud-quality-gate-action@v1.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-and-push:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: raihanrony015
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push go-service
        uses: docker/build-push-action@v6
        with:
          context: ./go-service
          push: true
          tags: raihanrony015/url-go:${{ github.sha }}

      - name: Build & push node-service
        uses: docker/build-push-action@v6
        with:
          context: ./node-service
          push: true
          tags: raihanrony015/url-node:${{ github.sha }}

      - name: Build & push python-service
        uses: docker/build-push-action@v6
        with:
          context: ./python-service
          push: true
          tags: raihanrony015/url-py:${{ github.sha }}

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo (for reference)
        uses: actions/checkout@v4

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Install yq
        uses: mikefarah/yq@v4.44.3

      - name: Update images in GitOps manifests
        env:
          DOCKERHUB_USERNAME: raihanrony015
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          export GO_IMAGE="${DOCKERHUB_USERNAME}/url-go:${SHA}"
          export NODE_IMAGE="${DOCKERHUB_USERNAME}/url-node:${SHA}"
          export PY_IMAGE="${DOCKERHUB_USERNAME}/url-py:${SHA}"

          FILE="gitops/k8s/deployments-app.yaml"

          yq -i '(.spec.template.spec.containers |= (map(if .name == "go-service" then .image = strenv(GO_IMAGE) else . end)))' "$FILE"
          yq -i '(.spec.template.spec.containers |= (map(if .name == "node-service" then .image = strenv(NODE_IMAGE) else . end)))' "$FILE"
          yq -i '(.spec.template.spec.containers |= (map(if .name == "python-service" then .image = strenv(PY_IMAGE) else . end)))' "$FILE"

      - name: Commit & push GitOps change
        run: |
          set -euo pipefail
          cd gitops
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add k8s/deployments-app.yaml
          git commit -m "Update images to ${{ github.sha }}" || exit 0
          git push
