name: Build, Push & Deploy

on:
  push:
    branches: [dev]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build and start stack
        run: |
          docker compose up -d --build

      - name: Wait for services
        shell: bash
        run: |
          set -euo pipefail

          wait_http () {
            local url="$1"
            local name="$2"
            local max_secs="${3:-60}"
            echo "Waiting for $name at $url (max ${max_secs}s)…"
            for i in $(seq 1 "$max_secs"); do
              if curl -fsS "$url" >/dev/null 2>&1; then
                echo "$name is up"
                return 0
              fi
              sleep 1
            done
            echo "Timed out waiting for $name"
            return 1
          }

          wait_http "http://localhost:3000/health" "node-service" 90
          wait_http "http://localhost:5001/api/stats" "python-service" 90

          echo "Waiting for go-service at http://localhost:8000/api/shorten …"
          for i in $(seq 1 90); do
            if curl -fsS -X POST "http://localhost:8000/api/shorten" -H 'Content-Type: application/json' -d '{"long_url":"https://example.com"}' >/dev/null 2>&1; then
              echo "go-service is up"
              break
            fi
            sleep 1
          done

      - name: End-to-end smoke (shorten → redirect → stats)
        shell: bash
        run: |
          set -euo pipefail

          resp=$(curl -fsS -X POST "http://localhost:8000/api/shorten" \
            -H 'Content-Type: application/json' \
            -d '{"long_url":"https://example.com"}')

          echo "Shorten response: $resp"
          code=$(echo "$resp" | sed -n 's/.*"short_code":"\([^"]*\)".*/\1/p')
          [[ -n "$code" ]]

          http_code=$(curl -sS -o /dev/null -w '%{http_code}' "http://localhost:8000/${code}")
          echo "Redirect status: $http_code"
          [[ "$http_code" == "301" || "$http_code" == "302" ]]

          sleep 2

          stats=$(curl -fsS "http://localhost:5001/api/stats")
          echo "Stats response (truncated): ${stats:0:400}"
          echo "$stats" | grep -q '"total_urls"'
          echo "$stats" | grep -q '"total_clicks"'

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Shutdown
        if: always()
        run: docker compose down -v

  build-and-push:
    needs: smoke-test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Go service
        uses: docker/build-push-action@v6
        with:
          context: ./go-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/url-go:${{ github.sha }}

      - name: Build and push Node service
        uses: docker/build-push-action@v6
        with:
          context: ./node-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/url-node:${{ github.sha }}

      - name: Build and push Python service
        uses: docker/build-push-action@v6
        with:
          context: ./python-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/url-py:${{ github.sha }}

  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Update image tags in manifests repo
        env:
          MANIFEST_REPO_TOKEN: ${{ secrets.MANIFEST_REPO_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          git clone "https://x-access-token:${MANIFEST_REPO_TOKEN}@github.com/${{ github.repository_owner }}/manifests-repo.git"
          cd manifests-repo

          sed -i "s|image: .*/url-go:.*|image: ${DOCKERHUB_USERNAME}/url-go:${SHA}|" k8s/deployments-app.yaml
          sed -i "s|image: .*/url-node:.*|image: ${DOCKERHUB_USERNAME}/url-node:${SHA}|" k8s/deployments-app.yaml
          sed -i "s|image: .*/url-py:.*|image: ${DOCKERHUB_USERNAME}/url-py:${SHA}|" k8s/deployments-app.yaml

          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add k8s/deployments-app.yaml
          git diff --cached --quiet || git commit -m "ci: update images to ${SHA}"
          git push
