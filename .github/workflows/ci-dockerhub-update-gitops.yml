name: CI -> Docker Hub -> GitOps Repo

on:
  push:
    branches:
      - dev

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push go-service
        uses: docker/build-push-action@v6
        with:
          context: ./go-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/url-go:${{ github.sha }}

      - name: Build & push node-service
        uses: docker/build-push-action@v6
        with:
          context: ./node-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/url-node:${{ github.sha }}

      - name: Build & push python-service
        uses: docker/build-push-action@v6
        with:
          context: ./python-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/url-py:${{ github.sha }}

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo (for reference)
        uses: actions/checkout@v4

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Install yq
        uses: mikefarah/yq@v4.44.3

      - name: Update images in GitOps manifests
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          export GO_IMAGE="${DOCKERHUB_USERNAME}/url-go:${SHA}"
          export NODE_IMAGE="${DOCKERHUB_USERNAME}/url-node:${SHA}"
          export PY_IMAGE="${DOCKERHUB_USERNAME}/url-py:${SHA}"

          FILE="gitops/k8s/deployments-app.yaml"

          yq -i '(.spec.template.spec.containers |= (map(if .name == "go-service" then .image = strenv(GO_IMAGE) else . end)))' "$FILE"
          yq -i '(.spec.template.spec.containers |= (map(if .name == "node-service" then .image = strenv(NODE_IMAGE) else . end)))' "$FILE"
          yq -i '(.spec.template.spec.containers |= (map(if .name == "python-service" then .image = strenv(PY_IMAGE) else . end)))' "$FILE"

      - name: Commit & push GitOps change
        run: |
          set -euo pipefail
          cd gitops
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add k8s/deployments-app.yaml
          git commit -m "Update images to ${{ github.sha }}" || exit 0
          git push
