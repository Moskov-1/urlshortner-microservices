apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-service
  template:
    metadata:
      labels:
        app: go-service
    spec:
      containers:
        - name: go-service
          image: url-go:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          env:
            - name: PYTHON_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: urlshortner-config
                  key: PYTHON_SERVICE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: urlshortner-secrets
                  key: REDIS_URL
            - name: DB_PATH
              valueFrom:
                configMapKeyRef:
                  name: urlshortner-config
                  key: GO_DB_PATH
          volumeMounts:
            - name: go-data
              mountPath: /data
      volumes:
        - name: go-data
          persistentVolumeClaim:
            claimName: go-data-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
